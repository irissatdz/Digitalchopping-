<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRIS SAT | الواجهة الرسمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --iris-blue: #00d2ff; 
            --main-black: #020205; 
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }

        body { 
            background-color: var(--main-black); 
            background: radial-gradient(circle at center, #0a0a1a 0%, var(--main-black) 100%);
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            overflow: hidden; 
        }
        
        /* الحاوية الزجاجية المركزية */
        .container { 
            text-align: center; 
            z-index: 10; 
            padding: 50px 25px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            max-width: 550px;
            width: 90%;
            animation: fadeIn 1.2s ease-out;
        }

        .logo { 
            width: 240px; 
            filter: drop-shadow(0 0 30px rgba(0, 210, 255, 0.4)); 
            margin-bottom: 20px; 
            animation: float 4s ease-in-out infinite;
        }

        h1 { 
            font-size: 2.8rem; 
            font-weight: 900; 
            margin-bottom: 8px; 
            background: linear-gradient(180deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle { 
            color: #777; 
            margin-bottom: 40px; 
            font-size: 1rem;
            font-weight: 300;
        }

        /* زر الدخول العصري */
        .enter-btn {
            display: inline-block;
            text-decoration: none;
            background: transparent;
            border: 2px solid var(--iris-blue);
            color: white;
            padding: 14px 60px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 35px;
        }

        .enter-btn:hover {
            background: var(--iris-blue);
            color: #000;
            box-shadow: 0 0 40px var(--iris-blue);
            transform: scale(1.05);
        }

        /* العبارة القوية الموحدة */
        .brand-slogan {
            width: 100%;
            margin-top: 10px;
            font-size: 1.2rem;
            font-weight: 900; /* خط عريض جداً */
            color: #ffffff;
            text-align: center;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
            display: block;
        }

        .brand-slogan span.dot {
            color: var(--iris-blue);
            margin: 0 6px;
            font-size: 1.5rem;
        }

        /* حركات الأنيميشن */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

    </style>
</head>
<body>

    <div class="container">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTQOX3hX2a4mLHIOUhANPFdom0b1MxFDOYJ08M5hfDVVg&s=10" class="logo">
        
        <h1>IRIS </h1>
        <p class="subtitle">مرحباً بكم في عالم الابتكار</p>
        
       <a href="products.html" class="enter-btn">دخول المتجر</a>


        <div class="brand-slogan">
            إيريس <span class="dot">.</span> ثقة <span class="dot">.</span> جودة <span class="dot">.</span> أمان <span class="dot">.</span> سرعة في التوصيل
        </div>
    </div>

</body>
</html>
